name: Attach clean StepOne tree

on:
  push:
    branches: [codex/stepone-jenga-production]

permissions:
  contents: write

jobs:
  attach:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Find clean commit and move branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          target=$(gh api -H 'Accept: application/vnd.github+json' "/search/commits?q=repo:${REPO}+%22Build+StepOne+production+app+for+Jenga%22&sort=committer-date&order=desc&per_page=10" --jq '.items[0].sha')
          test -n "$target"
          gh api --method PATCH "/repos/${REPO}/git/refs/heads/codex/stepone-jenga-production" -f sha="$target" -F force=true
