name: Materialize StepOne source

on:
  push:
    branches: [codex/stepone-production-app]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'codex/stepone-production-app'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Rebuild and validate source archive
        shell: bash
        run: |
          set +e
          cat .bootstrap/part-* > /tmp/stepone.b64
          base64 -d /tmp/stepone.b64 > /tmp/stepone.tar.xz
          decode_status=$?
          actual_sha=$(sha256sum /tmp/stepone.tar.xz | cut -d' ' -f1)
          xz -t /tmp/stepone.tar.xz
          xz_status=$?
          tar -tJf /tmp/stepone.tar.xz > /tmp/archive-files.txt
          tar_status=$?
          {
            echo "expected_sha=7e6fd188a9a0f60f9843657ddd8a37c05858675ac00b54148b667291b2b5270f"
            echo "actual_sha=$actual_sha"
            echo "decode_status=$decode_status"
            echo "xz_status=$xz_status"
            echo "tar_status=$tar_status"
            echo "archive_bytes=$(wc -c < /tmp/stepone.tar.xz)"
          } > /tmp/materialize-diagnostics.txt
          cat /tmp/materialize-diagnostics.txt
          if [ "$decode_status" -ne 0 ] || [ "$xz_status" -ne 0 ] || [ "$tar_status" -ne 0 ]; then
            cp /tmp/materialize-diagnostics.txt .bootstrap/diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .bootstrap/diagnostic.txt
            git commit -m "Add source archive diagnostics" || true
            git push origin HEAD:codex/stepone-production-app || true
            exit 1
          fi
      - name: Materialize source
        run: |
          rm -rf .bootstrap
          tar -xJf /tmp/stepone.tar.xz -C .
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          rm -f .github/workflows/materialize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build StepOne production app"
          git push origin HEAD:codex/stepone-production-app
