name: Diagnose StepOne archive

on:
  push:
    branches: [codex/stepone-production-app]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      - name: Rebuild and inspect archive
        shell: bash
        run: |
          set +e
          cat .bootstrap/part-* > /tmp/stepone.b64
          base64 -d /tmp/stepone.b64 > /tmp/stepone.tar.xz
          decode_status=$?
          actual_sha=$(sha256sum /tmp/stepone.tar.xz | cut -d' ' -f1)
          xz -t /tmp/stepone.tar.xz
          xz_status=$?
          tar -tJf /tmp/stepone.tar.xz > /tmp/archive-files.txt
          tar_status=$?
          {
            echo "expected_sha=7e6fd188a9a0f60f9843657ddd8a37c05858675ac00b54148b667291b2b5270f"
            echo "actual_sha=$actual_sha"
            echo "decode_status=$decode_status"
            echo "xz_status=$xz_status"
            echo "tar_status=$tar_status"
            echo "base64_bytes=$(wc -c < /tmp/stepone.b64)"
            echo "archive_bytes=$(wc -c < /tmp/stepone.tar.xz)"
          } > /tmp/materialize-diagnostics.txt
          cat /tmp/materialize-diagnostics.txt
      - uses: actions/upload-artifact@v4
        with:
          name: stepone-archive-diagnostics
          path: |
            /tmp/materialize-diagnostics.txt
            /tmp/archive-files.txt
            /tmp/stepone.tar.xz
